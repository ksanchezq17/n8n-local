name: n8n-local

services:
  n8n:
    image: n8nio/n8n:latest
    # build:
    #   context: ../
    #   dockerfile: docker/docker-images/n8n-dockerfile
    container_name: n8n-main
    environment:
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      - N8N_NATIVE_PYTHON_RUNNER=true
    ports:
      - "5678:5678"
    volumes:
      - ../data/n8n:/home/node/.n8n
    # etc.

  task-runners:
    # image: n8nio/runners:latest
    build:
      context: ../
      dockerfile: docker/docker-images/runners-dockerfile
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-main:5679
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      # etc.
    depends_on:
      - n8n

  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    # AMD Radeon (ROCm). Requires a Linux host/VM with ROCm-capable kernel drivers.
    devices:
      - /dev/dxg:/dev/dxg
    group_add:
      - 44
      - 992
    environment:
      # Optional: set in docker/.env if your ROCm stack needs an override for RX 7900 (gfx1100)
      - HSA_OVERRIDE_GFX_VERSION=${OLLAMA_HSA_OVERRIDE_GFX_VERSION:-}
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib #:/usr/lib/wsl/lib/x86_64-linux-gnu

    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ../data/ollama:/root/.ollama

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    gpus: all
    ports:
      - "${VLLM_PORT:-8000}:8000"
    volumes:
      - ../data/hf-cache:/root/.cache/huggingface
    environment:
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
    command:
      - "--model"
      - "${VLLM_MODEL:-meta-llama/Llama-3.1-8B-Instruct}"
      - "--dtype"
      - "${VLLM_DTYPE:-auto}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"

